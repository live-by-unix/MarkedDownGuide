<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearnMD</title>
  <link rel="icon" type="image/png" href="/image.png">
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.6;
    }
    nav {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #ddd;
      padding-bottom: 0.5rem;
    }
    nav a {
      text-decoration: none;
      color: #0366d6;
      font-weight: 500;
      cursor: pointer;
    }
    nav a:hover {
      text-decoration: underline;
    }
    pre {
      background: #f5f5f5;
      padding: 1rem;
      overflow-x: auto;
      border-radius: 8px;
    }
    code {
      font-family: Consolas, monospace;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1rem 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
    }
    th {
      background: #f0f0f0;
    }
    blockquote {
      border-left: 4px solid #ccc;
      margin-left: 0;
      padding-left: 1rem;
      color: #666;
    }
    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>

<nav>
  <a onclick="showPage('home')">Home</a>
  <a onclick="showPage('guide')">Guide</a>
  <a onclick="showPage('cheatsheet')">Cheat Sheet</a>
  <a onclick="showPage('editor')">Editor</a>
  <a href="https://github.com/live-by-unix/MarkDownGuide" target="_blank">GitHub</a>
</nav>

<div id="content">Loading...</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
async function loadMarkdown(file) {
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error("Could not load " + file);
    const md = await res.text();
    document.getElementById("content").innerHTML = marked.parse(md);
  } catch (err) {
    document.getElementById("content").innerHTML =
      `<h2>Error</h2><p>${err.message}</p>`;
  }
}

function showPage(page) {
  if (page === 'home') {
    document.getElementById("content").innerHTML = `
      <h1>Welcome to LearnMD</h1>
      <p>LearnMD is your interactive guide to mastering Markdown.</p>
      <p>Explore the Guide, check the Cheat Sheet, and experiment live in the Editor.</p>
      <p>All content is open source on <a href="https://github.com/live-by-unix/MarkDownGuide" target="_blank">GitHub</a>.</p>
    `;
  } else if (page === 'guide') {
    loadMarkdown("guide.md");
  } else if (page === 'cheatsheet') {
    loadMarkdown("cheatsheet.md");
  } else if (page === 'editor') {
    document.getElementById("content").innerHTML = `
      <h1>Markdown Editor</h1>
      <p>Experiment with Markdown live below:</p>
      <div style="max-width:900px; margin:auto;">
        <iframe src="https://marky-editor.pages.dev"
          style="width:100%; height:600px; border:none; border-radius:8px;">
        </iframe>
      </div>
    `;
  }
}

// Default page
showPage('home');
</script>

</body>
</html>
